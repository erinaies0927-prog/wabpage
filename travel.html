<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Travel Map</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
body{
    margin:0;
    background:#f8f8f8;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
var chart = echarts.init(document.getElementById('map'));

var option = {
    backgroundColor: '#ffffff',

    geo: {
        map: 'world',
        roam: true,
        emphasis: {
            label: {
                show: false
            }
        }
    },

    series: [
        {
            type: 'lines',
            coordinateSystem: 'geo',
            effect: {
                show: true,
                symbol: 'arrow',
                symbolSize: 6
            },
            lineStyle: {
                width: 2,
                curveness: 0.2
            },
            data: [
                {coords: [[135.5023,34.6937],[121.5654,25.0330]]}, // 台湾
                {coords: [[135.5023,34.6937],[144.7937,13.4443]]}, // グアム
                {coords: [[135.5023,34.6937],[126.9780,37.5665]]}, // 韓国
                {coords: [[135.5023,34.6937],[103.8198,1.3521]]},  // シンガポール
                {coords: [[135.5023,34.6937],[14.4378,50.0755]]},  // チェコ
                {coords: [[135.5023,34.6937],[16.3738,48.2082]]}   // オーストリア
            ]
        },
        {
            type: 'scatter',
            coordinateSystem: 'geo',
            symbolSize: 10,
            data: [
                {name:'Japan', value:[135.5023,34.6937]},
                {name:'Taiwan', value:[121.5654,25.0330]},
                {name:'Guam', value:[144.7937,13.4443]},
                {name:'Korea', value:[126.9780,37.5665]},
                {name:'Singapore', value:[103.8198,1.3521]},
                {name:'Czech', value:[14.4378,50.0755]},
                {name:'Austria', value:[16.3738,48.2082]}
            ]
        }
    ]
};

chart.setOption(option);
</script>

</body>
</html>
